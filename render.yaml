services:
  - type: web
    name: hale-excstds-pipeline
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.server.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PBI_TENANT_ID
        sync: false
      - key: PBI_CLIENT_ID
        sync: false
      - key: PBI_CLIENT_SECRET
        sync: false
      - key: PBI_WORKSPACE_ID
        sync: false
      - key: PBI_DATASET_ID
        sync: false
      - key: EXCSTDS_EXPORT_BASE
        value: https://haleglobal.com/excellence_export.php
      - key: EXCSTDS_EXPORT_TOKEN
        sync: false
      - key: PIPELINE_API_TOKEN
        sync: false
      - key: PYTHONPATH
        value: src
