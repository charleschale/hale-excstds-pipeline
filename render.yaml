services:
  - type: web
    name: hale-excstds-pipeline
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.server.app:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /healthz
    envVars:
      - key: PBI_TENANT_ID
        sync: false
      - key: PBI_CLIENT_ID
        sync: false
      - key: PBI_CLIENT_SECRET
        sync: false
      - key: PBI_WORKSPACE_ID
        sync: false
      - key: PBI_DATASET_ID
        sync: false
      - key: PBI_IMPERSONATED_USER
        sync: false
      - key: MYSQL_HOST
        sync: false
      - key: MYSQL_PORT
        value: "3306"
      - key: MYSQL_DATABASE
        sync: false
      - key: MYSQL_USER
        sync: false
      - key: MYSQL_PASSWORD
        sync: false
      - key: PIPELINE_API_TOKEN
        sync: false
      - key: PYTHONPATH
        value: src
